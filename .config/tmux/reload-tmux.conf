# ~/.config/tmux/tmux.conf

# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
set -g renumber-windows on
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Enable focus events for vim autoread
set -g focus-events on

# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Aggressive resize for multi-client
setw -g aggressive-resize on

# ============================================
# KEY BINDINGS
# ============================================

# Change prefix to Ctrl+a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Better pane splitting (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================
# APPEARANCE
# ============================================

# Status bar position
set -g status-position top

# Status bar colors
set -g status-style 'bg=black fg=#8b949e'
set -g status-left-length 20
set -g status-right-length 50

# Status bar content
## session name
set -g status-left '#[fg=#8b949e,bold] #S #[fg=#30363d]│ '

set -g status-right '#[fg=#30363d]│#[fg=#8b949e] %H:%M #[fg=#30363d]│#[fg=#8b949e] %d-%b-%y '

# Window status
setw -g window-status-current-format '#[bg=#39363d,fg=white,bold] #I:#W '

## Sets window with activity to have a star beside it
%hidden NORMAL_FORMAT='#I:#W #[fg=#30363d]│'
%hidden ACTIVITY_FORMAT='#I:#W* #[fg=#30363d,bold]│'
setw -g window-status-format "#{?window_activity_flag2p,#{E:ACTIVITY_FORMAT},#{E:NORMAL_FORMAT}}"

# Pane border colors
set -g pane-border-style 'fg=#30363d'
set -g pane-active-border-style 'bg=#39363d'

# Message styling
set -g message-style 'bg=black fg=#8b949e bold'

# ============================================
# COPY MODE
# ============================================

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"  # macOS
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"  # Linux


# Enable pane ~/.config/tmux/plugins/tpm sync with option y
bind-key y set-window-option synchronize-panes\; display-message "synchronize mode toggled."

# sessionizer keybinds
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind-key -r M-h run-shell "tmux neww tmux-sessionizer -s 0"
bind-key -r M-t run-shell "tmux neww tmux-sessionizer -s 1"
bind-key -r M-n run-shell "tmux neww tmux-sessionizer -s 2"
bind-key -r M-s run-shell "tmux neww tmux-sessionizer -s 3"

# ============================================
# PLUGINS (via TPM)
# ============================================
#
# Install TPM first:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin config
#
# continuum
# keep continuum config before resurrect config or it wont activate on install
set -g @continuum-restore 'on'
set-option -g @continuum-save-interval '5'
set -g @continuum-boot 'on'
# set -g status-right 'Continuum status: #{continuum_status}' # for debugging purposes

# resurrect
set -g @resurrect-dir "$HOME/.local/share/tmux/resurrect"
set -g @resurrect-capture-pane-contents 'on'
# set -g @resurrect-strategy-nvim 'session' # requires tpope/vim-obssession

# Initialize TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
